<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมสะกดคำภาษาอังกฤษ ป.1 (12 คำ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans select-none relative min-h-screen">
    
    <div class="max-w-md mx-auto bg-white p-5 rounded-3xl shadow-xl border-4 border-indigo-200 mt-2">
        
        <div class="flex justify-center mb-4">
            <button id="mode-toggle-btn" onclick="toggleMode()" class="text-xs bg-emerald-100 text-emerald-700 font-bold px-4 py-2 rounded-full shadow-sm active:scale-95 transition-all cursor-pointer">
                โหมด: ง่าย 🌱 (กดเพื่อเปลี่ยน)
            </button>
        </div>

        <div class="flex justify-between items-center mb-4 border-t border-slate-100 pt-3">
            <span class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-full text-xs">
                คำที่ <span id="word-number">1</span>/12
            </span>
            <span class="text-amber-500 font-bold">⭐ คะแนน: <span id="score-display">0</span>/12</span>
        </div>
        
        <div id="emoji-display" class="text-5xl text-center mb-2 animate-bounce"></div>
        <h2 id="english-hint" class="text-xs font-bold text-center text-slate-400 mb-4 h-4 uppercase tracking-widest">สะกดคำศัพท์ให้ถูกต้อง</h2>
        
        <div class="flex flex-col items-center justify-center mb-4">
            <button onclick="playWordAudio()" class="w-16 h-16 bg-indigo-500 hover:bg-indigo-600 text-white rounded-full flex items-center justify-center text-3xl shadow-lg active:scale-95 transition-all cursor-pointer border-4 border-indigo-200">
                🔊
            </button>
            <span class="text-[10px] font-bold text-indigo-600 mt-2">👇 กดเพื่อฟังเสียง</span>
        </div>

        <div id="slots-container" class="flex flex-wrap justify-center gap-2 mb-2 min-h-[50px] items-center p-2"></div>
        
        <div id="status-message" class="text-center text-sm font-bold text-rose-500 min-h-[40px] mb-3 flex items-center justify-center p-2 bg-rose-50 rounded-xl"></div>

        <button id="submit-btn" onclick="checkAnswer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-all text-base mb-4 cursor-pointer">
            ✅ ยืนยันคำตอบ
        </button>

        <div id="translation-container" class="flex-col items-center gap-3 mb-4 w-full" style="display: none;">
            <div class="w-full h-[2px] bg-slate-100 mb-1"></div>
            <h4 class="text-sky-700 font-bold text-base mb-1">👇 คำนี้แปลว่าอะไรเอ่ย? เลือกเลย!</h4>
            <div id="translation-options" class="flex flex-col gap-2 w-full"></div>
        </div>

        <div id="control-panel" class="flex justify-between items-center mb-4 border-t border-slate-100 pt-3">
            <button onclick="initGame()" class="text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold px-3 py-2 rounded-xl transition active:scale-95 cursor-pointer">เริ่มใหม่ 🔄</button>
            <div class="flex gap-2">
                <button onclick="backspace()" class="text-xs bg-amber-100 hover:bg-amber-200 text-amber-700 font-bold px-3 py-2 rounded-xl transition active:scale-95 cursor-pointer">ลบทีละตัว ⌫</button>
                <button onclick="clearCurrentWord()" class="text-xs bg-rose-100 hover:bg-rose-200 text-rose-600 font-bold px-3 py-2 rounded-xl transition active:scale-95 cursor-pointer">ลบทั้งหมด ↩️</button>
            </div>
        </div>

        <div id="keyboard-container" class="flex flex-wrap justify-center gap-2 bg-slate-50 p-4 rounded-2xl border border-slate-200"></div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-slate-900/60 items-center justify-center p-4 z-50" style="display: none;">
        <div class="bg-white rounded-3xl p-5 max-w-sm w-full text-center shadow-2xl border-4 border-emerald-400 max-h-[95vh] overflow-y-auto">
            <span class="text-4xl block mb-1">🎉</span>
            <h3 class="text-lg font-bold text-emerald-600 mb-1">ถูกต้องและแปลเก่งมาก!</h3>
            
            <div class="bg-indigo-50 rounded-2xl p-3 mb-3 border border-indigo-100">
                <div id="modal-word-display" class="text-3xl font-black text-indigo-900 tracking-wide mb-2"></div>
                <button onclick="playWordAudio()" class="bg-indigo-200 hover:bg-indigo-300 text-indigo-800 font-bold px-4 py-1.5 rounded-full text-xs active:scale-95 transition">🔊 ฟังภาษาอังกฤษ</button>
            </div>

            <div class="bg-sky-50 border border-sky-100 rounded-xl p-3 mb-3 text-center">
                <p id="modal-thai-text" class="text-sm font-bold text-sky-800 mb-2"></p>
                <button onclick="playThaiAudio()" class="bg-white text-sky-600 border border-sky-300 px-4 py-1 rounded-xl text-xs active:scale-95 transition shadow-xs flex items-center gap-1 mx-auto font-bold">
                    <span>🔊</span> ฟังคำแปลไทย
                </button>
            </div>

            <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-3 mb-3 text-center">
                <span class="text-[10px] bg-indigo-200 text-indigo-800 font-bold px-2 py-0.5 rounded-md uppercase">ตัวอย่างประโยค</span>
                <p id="modal-sentence-en" class="text-sm font-bold text-slate-800 my-2 tracking-wide italic"></p>
                <p id="modal-sentence-th" class="text-xs font-medium text-slate-500 mb-2"></p>
                <button onclick="playSentenceAudio()" class="bg-white text-indigo-600 border border-indigo-300 px-4 py-1.5 rounded-xl text-xs active:scale-95 transition shadow-xs flex items-center gap-1 mx-auto font-bold">
                    <span>🔊</span> ฟังประโยค
                </button>
            </div>
            
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 text-left">
                <span class="text-xs font-bold text-amber-700 block mb-0.5">💡 ทริคจำ:</span>
                <p id="modal-tip" class="text-[11px] text-slate-600 leading-relaxed"></p>
            </div>
            
            <button id="next-word-btn" onclick="goToNextWord()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-all text-sm cursor-pointer">คำต่อไป ➡️</button>
        </div>
    </div>

    <div id="game-over-modal" class="fixed inset-0 bg-slate-900/70 items-center justify-center p-4 z-50" style="display: none;">
        <div class="bg-white rounded-3xl p-6 max-w-xs w-full text-center shadow-2xl border-4 border-amber-400">
            <span id="final-modal-icon" class="text-6xl block mb-4">🏆</span>
            <h2 class="text-2xl font-black text-slate-800 mb-2">สรุปคะแนนรวม</h2>
            <div class="bg-indigo-50 rounded-2xl p-4 mb-6 border border-indigo-100">
                <span class="text-sm font-bold text-indigo-600 block mb-1">คะแนนที่ได้ทั้งหมด</span>
                <div class="text-5xl font-black text-indigo-900"><span id="final-score">0</span> <span class="text-2xl text-slate-400 font-bold">/ 12</span></div>
            </div>
            <p id="final-evaluation" class="text-sm font-bold text-emerald-600 mb-6 leading-relaxed"></p>
            <button onclick="restartGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 transition-all text-base cursor-pointer">🔄 เล่นใหม่อีกรอบ</button>
        </div>
    </div>

    <script>
        var vocabularyList = [
            {w:"foot", t:"เท้า", em:"🦶", chunks: ["foot"], tip: "ถ้ามีเท้า 2 ข้างเรียกว่า feet", s: "I have two feet.", st:"ฉันมีเท้าสองข้าง"},
            {w:"see", t:"ดู, พบ, เห็น", em:"👀", chunks: ["see"], tip: "s + ee", s: "I see a bird.", st:"ฉันเห็นนกตัวหนึ่ง"},
            {w:"hear", t:"ฟัง, ได้ยิน", em:"👂", chunks: ["hear"], tip: "h + ear (หู)", s: "I can hear the music.", st:"ฉันได้ยินเสียงเพลง"},
            {w:"knee", t:"เข่า", em:"🦵", chunks: ["knee"], tip: "ตัว k ไม่ออกเสียง + nee", s: "I hurt my knee.", st:"ฉันเจ็บเข่า"},
            {w:"shoulder", t:"ไหล่", em:"🤷‍♂️", chunks: ["shoul", "der"], tip: "shoul + der", s: "Touch your shoulder.", st:"แตะที่ไหล่ของคุณ"},
            {w:"brother", t:"พี่ชาย, น้องชาย", em:"👦", chunks: ["bro", "ther"], tip: "bro + ther", s: "I play with my brother.", st:"ฉันเล่นกับพี่ชายหรือน้องชาย"},
            {w:"stem", t:"ต้น, ลำต้น", em:"🌱", chunks: ["stem"], tip: "s + tem", s: "The flower has a green stem.", st:"ดอกไม้มีลำต้นสีเขียว"},
            {w:"leaf", t:"ใบ, ใบไม้", em:"🍃", chunks: ["leaf"], tip: "ถ้ามีหลายใบเรียกว่า leaves", s: "A green leaf falls from the tree.", st:"ใบไม้สีเขียวร่วงจากต้น"},
            {w:"flower", t:"ดอก, ดอกไม้", em:"🌸", chunks: ["flow", "er"], tip: "flow + er", s: "This flower is beautiful.", st:"ดอกไม้ดอกนี้สวยงาม"},
            {w:"respect", t:"เคารพ, ความเคารพ", em:"🙏", chunks: ["re", "spect"], tip: "re + spect", s: "We respect our teachers.", st:"พวกเราเคารพคุณครู"},
            {w:"unit", t:"หน่วย", em:"🔢", chunks: ["u", "nit"], tip: "u + nit", s: "Chapter one is the first unit.", st:"บทที่หนึ่งคือหน่วยแรก"},
            {w:"opinion", t:"ความเห็น", em:"💡", chunks: ["o", "pi", "nion"], tip: "o + pi + nion", s: "What is your opinion?", st:"ความเห็นของคุณคืออะไร?"}
        ];
        
        var shuffledList = [];
        var currentIndex = 0;
        var totalScore = 0;
        var isHardMode = false;
        var currentWordScore = 1.0;
        var userInput = "";
        var usedButtons = [];
        var audioCtx = null;

        // 🌟 แก้ไขคำสั่งตรวจสอบตัวเลขให้ปลอดภัย 100% 🌟
        function formatScore(num) { 
            return (num % 1 === 0) ? num : num.toFixed(1); 
        }

        function initAudio() {
            try {
                if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
                    var AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                }
                if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
            } catch (e) {}
        }
        
        function playTone(freq, wave, duration, delay) {
            try {
                if (!audioCtx) return;
                var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain();
                osc.type = wave; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(audioCtx.destination);
                var now = audioCtx.currentTime;
                gain.gain.setValueAtTime(0.2, now + delay); gain.gain.exponentialRampToValueAtTime(0.01, now + delay + duration);
                osc.start(now + delay); osc.stop(now + delay + duration);
            } catch (e) {}
        }
        
        function playSoundEffect(type) {
            initAudio();
            if (type === 'correct') {
                playTone(523.25, 'sine', 0.1, 0); playTone(659.25, 'sine', 0.1, 0.1); playTone(783.99, 'sine', 0.3, 0.2);
            } else if (type === 'wrong') {
                playTone(300, 'triangle', 0.2, 0); playTone(200, 'triangle', 0.3, 0.15);
            }
        }

        function safeSpeak(text, lang, rate) {
            try {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    var u = new SpeechSynthesisUtterance(text);
                    u.lang = lang || 'en-US';
                    u.rate = rate || 0.9;
                    window.speechSynthesis.speak(u);
                }
            } catch(e) {}
        }

        function playLetterAudio(l) { safeSpeak(l, 'en-US', 1.0); }
        function playWordAudio() { safeSpeak(shuffledList[currentIndex].w, 'en-US', 0.8); }
        function playThaiAudio() { safeSpeak(shuffledList[currentIndex].t, 'th-TH', 0.9); }
        function playSentenceAudio() { safeSpeak(shuffledList[currentIndex].s, 'en-US', 0.75); }

        function initGame() {
            shuffledList = vocabularyList.slice();
            shuffledList.sort(function() { return Math.random() - 0.5; });
            currentIndex = 0; 
            totalScore = 0;
            document.getElementById('score-display').innerText = formatScore(totalScore);
            loadWord();
        }

        function toggleMode() {
            isHardMode = !isHardMode;
            var btn = document.getElementById('mode-toggle-btn');
            btn.innerText = isHardMode ? "โหมด: ยาก 🔥 (กดเพื่อเปลี่ยน)" : "โหมด: ง่าย 🌱 (กดเพื่อเปลี่ยน)";
            btn.className = isHardMode ? "text-xs bg-red-100 text-red-700 font-bold px-4 py-2 rounded-full shadow-sm active:scale-95 transition-all cursor-pointer" : "text-xs bg-emerald-100 text-emerald-700 font-bold px-4 py-2 rounded-full shadow-sm active:scale-95 transition-all cursor-pointer";
            var badge = document.getElementById('mode-badge');
            if(isHardMode) { badge.style.display = 'inline-block'; } else { badge.style.display = 'none'; }
            loadWord();
        }

        function loadWord() {
            var data = shuffledList[currentIndex];
            var target = data.w;
            document.getElementById('word-number').innerText = currentIndex + 1;
            document.getElementById('emoji-display').innerText = data.em;
            
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('control-panel').style.display = 'flex';
            document.getElementById('keyboard-container').style.display = 'flex';
            document.getElementById('translation-container').style.display = 'none';
            document.getElementById('success-modal').style.display = 'none';
            
            var statusMsg = document.getElementById('status-message');
            statusMsg.innerText = "";
            statusMsg.className = "text-center text-sm font-bold text-rose-500 min-h-[40px] mb-3 flex items-center justify-center p-2 bg-rose-50 rounded-xl";
            
            userInput = ""; 
            usedButtons = []; 
            currentWordScore = 1.0;

            var container = document.getElementById('slots-container'); 
            container.innerHTML = "";
            var idx = 0;
            
            // 🌟 แก้ไขการเขียนโค้ด HTML ให้เป็นภาษาดั้งเดิม (ไม่ใช้เครื่องหมาย ` ` ป้องกันมือถือค้าง)
            data.chunks.forEach(function(chunk, i) {
                var colors = ["border-red-300 bg-red-50", "border-blue-300 bg-blue-50", "border-green-300 bg-green-50", "border-orange-300 bg-orange-50"];
                var color = colors[i % 4];
                var html = '<div class="flex gap-1 p-1.5 border-2 rounded-xl ' + color + '">';
                for(var j=0; j<chunk.length; j++) {
                    html += '<div class="w-8 h-10 border-b-4 border-indigo-400 flex items-center justify-center font-bold text-2xl text-indigo-900 bg-white rounded-t-sm shadow-sm" id="s-' + (idx++) + '"></div>';
                }
                html += '</div>';
                container.innerHTML += html;
            });

            var chars = target.split('');
            if (isHardMode) {
                var alpha = "abcdefghijklmnopqrstuvwxyz";
                var distractors = [];
                while(distractors.length < 4) {
                    var r = alpha.charAt(Math.floor(Math.random() * alpha.length));
                    if(chars.indexOf(r) === -1 && distractors.indexOf(r) === -1) { distractors.push(r); }
                }
                chars = chars.concat(distractors);
            }

            var kb = document.getElementById('keyboard-container'); 
            kb.innerHTML = "";
            chars.sort(function() { return Math.random() - 0.5; });
            
            // 🌟 แก้ไขการส่งข้อมูลให้ปุ่มกด เพื่อให้ทำงานเสถียร 100%
            for(var i=0; i<chars.length; i++) {
                (function(charVal) {
                    var btn = document.createElement('button');
                    btn.className = "bg-white w-12 h-14 rounded-xl border-b-4 border-slate-300 font-bold text-2xl text-slate-700 shadow-sm active:border-b-0 active:translate-y-1 active:bg-indigo-500 active:text-white transition-all flex items-center justify-center uppercase";
                    btn.innerText = charVal; 
                    btn.onclick = function() { handleKey(charVal, btn); };
                    kb.appendChild(btn);
                })(chars[i]);
            }
            
            setTimeout(function() { playWordAudio(); }, 500);
        }

        function handleKey(c, btn) {
            playLetterAudio(c); 
            var target = shuffledList[currentIndex].w;
            
            if(userInput.length < target.length) {
                userInput += c;
                var targetBox = document.getElementById('s-'+(userInput.length-1));
                if(targetBox) targetBox.innerText = c;
                
                btn.classList.add('opacity-30', 'pointer-events-none', 'scale-90');
                usedButtons.push(btn);
            }
        }

        function checkAnswer() {
            var target = shuffledList[currentIndex].w;
            
            if (userInput.length < target.length) {
                document.getElementById('status-message').innerText = "พิมพ์ให้ครบก่อนนะคนเก่ง ✏️"; 
                return; 
            }
            
            if (userInput === target) {
                playSoundEffect('correct');
                safeSpeak("ถูกต้องค่ะ แปลว่าอะไรคะ", 'th-TH', 1.0);
                
                document.getElementById('submit-btn').style.display = 'none';
                document.getElementById('control-panel').style.display = 'none';
                document.getElementById('keyboard-container').style.display = 'none';
                document.getElementById('translation-container').style.display = 'flex';
                
                var statusMsg = document.getElementById('status-message');
                statusMsg.innerText = "สะกดถูกแล้ว! เลือกคำแปลให้ตรงกับภาพเลยจ้า 🌟";
                statusMsg.className = "text-center text-sm font-bold text-emerald-600 min-h-[40px] mb-3 flex items-center justify-center p-2 bg-emerald-50 rounded-xl border border-emerald-200";

                generateTranslationOptions();
            } else {
                safeSpeak("อ๊ะอ๋า ลองใหม่นะคะ", 'th-TH', 0.9);
                currentWordScore = Math.max(0, currentWordScore - 0.5);
                document.getElementById('status-message').innerText = "สะกดยังไม่ถูกจ้า ลองลบแล้วเช็คตัวอักษรดูใหม่นะ 💡";
            }
        }

        function generateTranslationOptions() {
            var currentWord = shuffledList[currentIndex];
            var options = [currentWord]; 
            
            var shuffledVocab = vocabularyList.slice().sort(function() { return Math.random() - 0.5; });
            for (var i = 0; i < shuffledVocab.length; i++) {
                if (shuffledVocab[i].w !== currentWord.w && options.length < 4) {
                    options.push(shuffledVocab[i]);
                }
            }
            
            options.sort(function() { return Math.random() - 0.5; });
            
            var optionsContainer = document.getElementById('translation-options');
            optionsContainer.innerHTML = "";
            
            options.forEach(function(opt) {
                var btn = document.createElement('button');
                btn.className = "w-full bg-white border-2 border-sky-300 text-sky-800 font-bold py-3.5 rounded-xl shadow-sm hover:bg-sky-50 active:scale-95 transition-all text-base flex items-center justify-center gap-3";
                // 🌟 แก้ไขเป็นภาษาดั้งเดิม (ไม่ใช้ ` `)
                btn.innerHTML = '<span class="text-2xl">' + opt.em + '</span> <span>' + opt.t + '</span>';
                btn.onclick = function() { checkTranslation(opt.w, btn); };
                optionsContainer.appendChild(btn);
            });
        }

        function checkTranslation(selectedWordRaw, btn) {
            var targetWord = shuffledList[currentIndex].w;
            
            if (selectedWordRaw === targetWord) {
                safeSpeak("ยอดเยี่ยม หนูเก่งมาก", 'th-TH', 0.9);
                playSoundEffect('correct');
                
                totalScore += currentWordScore; 
                document.getElementById('score-display').innerText = formatScore(totalScore);
                
                document.getElementById('modal-word-display').innerText = targetWord;
                document.getElementById('modal-sentence-en').innerText = shuffledList[currentIndex].s;
                document.getElementById('modal-sentence-th').innerText = shuffledList[currentIndex].st;
                document.getElementById('modal-thai-text').innerText = shuffledList[currentIndex].t;
                document.getElementById('modal-tip').innerText = shuffledList[currentIndex].tip;
                
                document.getElementById('success-modal').style.display = 'flex';
            } else {
                safeSpeak("ยังไม่ใช่ค่ะ ลองนึกดูดีๆ นะคะ", 'th-TH', 0.9);
                playSoundEffect('wrong');
                currentWordScore = Math.max(0, currentWordScore - 0.5);
                
                btn.className = "w-full opacity-50 bg-rose-50 border-rose-200 text-rose-400 font-bold py-3.5 rounded-xl shadow-sm pointer-events-none flex items-center justify-center gap-3";
                
                var statusMsg = document.getElementById('status-message');
                statusMsg.innerText = "ยังไม่ใช่จ้า ลองดูรูปภาพแล้วเลือกใหม่นะ 🤔";
                statusMsg.className = "text-center text-sm font-bold text-rose-500 min-h-[40px] mb-3 flex items-center justify-center p-2 bg-rose-50 rounded-xl border border-rose-200";
            }
        }

        function goToNextWord() {
            document.getElementById('success-modal').style.display = 'none';
            if (currentIndex >= shuffledList.length - 1) { showGameOverSummary(); } 
            else { currentIndex++; loadWord(); }
        }

        function showGameOverSummary() {
            document.getElementById('final-score').innerText = formatScore(totalScore);
            var icon = totalScore === 12 ? "👑" : totalScore >= 10 ? "🏆" : totalScore >= 7 ? "✨" : "💪";
            document.getElementById('final-modal-icon').innerText = icon;
            document.getElementById('final-evaluation').innerText = totalScore === 12 ? "👑 สุดยอดอัจฉริยะตัวน้อย! หนูสะกดและแปลถูกหมดทุกคำเลย ได้คะแนนเต็ม เก่งที่สุดในโลก! 🎉" : "เก่งมากครับ! ลองฝึกบ่อยๆ รอบหน้าคว้าคะแนนเต็มแน่นอน!";
            
            document.getElementById('game-over-modal').style.display = 'flex';
            
            if(totalScore === 12) { safeSpeak("ยอดเยี่ยมที่สุดเลยค่ะ ได้คะแนนเต็ม", 'th-TH', 0.9); }
            else { safeSpeak("เก่งมากค่ะ ลองใหม่อีกรอบนะคะ", 'th-TH', 0.9); }
        }

        function restartGame() {
            document.getElementById('game-over-modal').style.display = 'none';
            initGame();
        }

        function backspace() {
            if(userInput.length > 0) {
                userInput = userInput.slice(0, -1);
                var targetBox = document.getElementById('s-'+userInput.length);
                if(targetBox) targetBox.innerText = "";
                var btn = usedButtons.pop();
                if(btn) btn.classList.remove('opacity-30', 'pointer-events-none', 'scale-90');
                document.getElementById('status-message').innerText = "";
            }
        }

        function clearCurrentWord() {
            var target = shuffledList[currentIndex].w;
            userInput = "";
            for(var i=0; i<target.length; i++) {
                var targetBox = document.getElementById('s-'+i);
                if(targetBox) targetBox.innerText = "";
            }
            usedButtons.forEach(function(b) { b.classList.remove('opacity-30', 'pointer-events-none', 'scale-90'); });
            usedButtons = [];
            document.getElementById('status-message').innerText = "";
        }

        // 🌟 รันระบบทันทีที่โหลดเสร็จ + แจ้งเตือนถ้าระบบเครื่องพัง
        window.onload = function() {
            try {
                initGame();
            } catch (e) {
                document.getElementById('status-message').innerText = "เกิดข้อผิดพลาดในมือถือ: " + e.message;
            }
        };

    </script>
</body>
</html>
