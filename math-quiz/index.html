<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบคณิต ป.1 หน่วย 1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-sky-50 p-3 font-sans select-none">
  <main class="max-w-lg mx-auto">
    <section id="home-screen" class="min-h-screen flex flex-col justify-center">
      <div class="bg-white border-4 border-sky-200 rounded-3xl shadow-xl p-5">
        <div class="text-center mb-5">
          <div class="text-5xl mb-2">🧮</div>
          <p class="text-xs font-black text-sky-500 uppercase tracking-wider">Grade 1 Math Quiz</p>
          <h1 class="text-2xl font-black text-slate-800">แบบทดสอบคณิต ป.1</h1>
          <p class="text-sm font-bold text-slate-500 mt-1">หน่วย 1-4 รวม 60 ข้อ สุ่มใหม่ทุกครั้ง</p>
        </div>

        <div class="grid gap-3 mb-5">
          <button onclick="startQuiz('all')" class="bg-sky-600 hover:bg-sky-700 text-white text-left rounded-2xl p-4 shadow-md active:scale-95 transition">
            <div class="text-lg font-black">ทำทั้งหมด 60 ข้อ</div>
            <div class="text-xs font-semibold text-sky-100">หน่วยละ 15 ข้อ พร้อมสรุปคะแนนแยกหน่วย</div>
          </button>
          <button onclick="startQuiz(1)" class="bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-800 text-left rounded-2xl p-4 active:scale-95 transition">
            <div class="font-black">หน่วย 1: จำนวนนับ 1-10 และ 0</div>
            <div class="text-xs text-slate-500 font-semibold">นับรูป เปรียบเทียบ เรียงลำดับ ส่วนย่อย-ส่วนรวม</div>
          </button>
          <button onclick="startQuiz(2)" class="bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-800 text-left rounded-2xl p-4 active:scale-95 transition">
            <div class="font-black">หน่วย 2: การบวกไม่เกิน 10</div>
            <div class="text-xs text-slate-500 font-semibold">สมการ รูปภาพ เติมตัวไม่ทราบค่า และโจทย์ปัญหา</div>
          </button>
          <button onclick="startQuiz(3)" class="bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-800 text-left rounded-2xl p-4 active:scale-95 transition">
            <div class="font-black">หน่วย 3: การลบตัวตั้งไม่เกิน 10</div>
            <div class="text-xs text-slate-500 font-semibold">สมการ รูปภาพ เติมตัวไม่ทราบค่า และโจทย์ปัญหา</div>
          </button>
          <button onclick="startQuiz(4)" class="bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-800 text-left rounded-2xl p-4 active:scale-95 transition">
            <div class="font-black">หน่วย 4: จำนวนนับ 11-20</div>
            <div class="text-xs text-slate-500 font-semibold">สิบกับหน่วย เปรียบเทียบ เรียงลำดับ 11-20</div>
          </button>
        </div>

        <a href="../" class="block text-center text-xs font-bold text-slate-500 underline">กลับหน้าเลือกแบบฝึกหัด</a>
      </div>
    </section>

    <section id="quiz-screen" class="hidden py-3">
      <div class="bg-white border-4 border-sky-200 rounded-3xl shadow-xl p-4">
        <div class="flex items-center justify-between gap-2 mb-3">
          <button onclick="goHome()" class="text-xs bg-slate-100 text-slate-700 font-bold px-3 py-2 rounded-full active:scale-95 transition">หน้าแรก</button>
          <button onclick="restartSameMode()" class="text-xs bg-amber-100 text-amber-700 font-bold px-3 py-2 rounded-full active:scale-95 transition">สุ่มใหม่ 🔄</button>
        </div>

        <div class="flex items-center justify-between mb-3">
          <span id="unit-badge" class="bg-sky-100 text-sky-700 font-black px-3 py-1 rounded-full text-xs">หน่วย 1</span>
          <span class="text-amber-500 font-black">⭐ <span id="score-display">0</span>/<span id="total-display">60</span></span>
        </div>

        <div class="w-full bg-slate-100 rounded-full h-2 mb-4 overflow-hidden">
          <div id="progress-bar" class="bg-sky-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="text-center text-xs font-black text-slate-400 mb-2">
          ข้อที่ <span id="question-number">1</span>/<span id="question-total">60</span>
        </div>

        <button onclick="playQuestionAudio()" class="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-black py-2 rounded-2xl active:scale-95 transition mb-3">
          🔊 ฟังโจทย์
        </button>

        <div id="question-card" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 mb-4">
          <h2 id="question-title" class="text-base font-black text-slate-800 text-center mb-3"></h2>
          <div id="question-visual" class="mb-3"></div>
          <p id="question-prompt" class="text-lg font-black text-center text-slate-800 leading-relaxed"></p>
        </div>

        <div id="options" class="grid grid-cols-2 gap-3 mb-4"></div>

        <div id="feedback" class="hidden rounded-2xl p-3 mb-4 text-center font-bold"></div>

        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 rounded-2xl shadow-md active:scale-95 transition">ข้อถัดไป ➜</button>
      </div>
    </section>

    <section id="result-screen" class="hidden min-h-screen flex flex-col justify-center">
      <div class="bg-white border-4 border-amber-300 rounded-3xl shadow-xl p-5 text-center">
        <div id="result-icon" class="text-6xl mb-3">🏆</div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">สรุปคะแนน</h2>
        <div class="bg-sky-50 border border-sky-100 rounded-2xl p-4 mb-4">
          <div class="text-sm font-bold text-sky-600">คะแนนรวม</div>
          <div class="text-5xl font-black text-sky-900"><span id="final-score">0</span>/<span id="final-total">60</span></div>
        </div>
        <div id="unit-summary" class="space-y-2 text-left mb-5"></div>
        <button onclick="restartSameMode()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-black py-3 rounded-2xl shadow-md active:scale-95 transition mb-3">สุ่มโจทย์ใหม่อีกชุด</button>
        <button onclick="goHome()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-black py-3 rounded-2xl active:scale-95 transition">กลับหน้าแรก</button>
      </div>
    </section>
  </main>

  <script>
    var unitNames = {
      1: "จำนวนนับ 1-10 และ 0",
      2: "การบวกไม่เกิน 10",
      3: "การลบตัวตั้งไม่เกิน 10",
      4: "จำนวนนับ 11-20"
    };
    var icons = ["🍎","🍌","🥕","🌽","🍪","🧁","✏️","📚","⚽","🧃","🧩","🎈"];
    var thaiDigits = ["๐","๑","๒","๓","๔","๕","๖","๗","๘","๙"];
    var quiz = [];
    var current = 0;
    var score = 0;
    var selectedMode = "all";
    var unitScores = {};
    var audioCtx = null;

    function safeSpeak(text, lang, rate) {
      try {
        if (window.speechSynthesis) {
          window.speechSynthesis.cancel();
          var u = new SpeechSynthesisUtterance(text);
          u.lang = lang || "th-TH";
          u.rate = rate || 0.9;
          window.speechSynthesis.speak(u);
        }
      } catch(e) {}
    }

    function speakMathText(text) {
      return String(text)
        .replace(/-/g, " ลบ ")
        .replace(/\+/g, " บวก ")
        .replace(/=/g, " เท่ากับ ")
        .replace(/>/g, " มากกว่า ")
        .replace(/</g, " น้อยกว่า ")
        .replace(/\?/g, " อะไร ")
        .replace(/___/g, " เติมเครื่องหมาย ");
    }

    function initAudio() {
      try {
        if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
          var AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      } catch(e) {}
    }

    function playTone(freq, wave, duration, delay) {
      try {
        if (!audioCtx) return;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = wave;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        var now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.18, now + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, now + delay + duration);
        osc.start(now + delay);
        osc.stop(now + delay + duration);
      } catch(e) {}
    }

    function playSoundEffect(type) {
      initAudio();
      if (type === "correct") {
        playTone(523.25, "sine", 0.1, 0);
        playTone(659.25, "sine", 0.1, 0.1);
        playTone(783.99, "sine", 0.24, 0.2);
      } else {
        playTone(260, "triangle", 0.18, 0);
        playTone(180, "triangle", 0.24, 0.14);
      }
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(arr) {
      return arr[rand(0, arr.length - 1)];
    }

    function shuffle(arr) {
      var copy = arr.slice();
      for (var i = copy.length - 1; i > 0; i--) {
        var j = rand(0, i);
        var temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }
      return copy;
    }

    function uniqOptions(answer, min, max, count) {
      var options = [String(answer)];
      var guard = 0;
      while (options.length < count && guard < 80) {
        var n = rand(min, max);
        if (options.indexOf(String(n)) === -1) options.push(String(n));
        guard++;
      }
      return shuffle(options);
    }

    function compareSymbol(a, b) {
      if (a > b) return ">";
      if (a < b) return "<";
      return "=";
    }

    function numberLine(nums) {
      return '<div class="flex flex-wrap justify-center gap-2">' + nums.map(function(n) {
        var cls = "bg-white text-slate-700 border-slate-200";
        return '<span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center font-black text-lg ' + cls + '">' + n + '</span>';
      }).join("") + '</div>';
    }

    function sequenceVisual(nums, missingIndex) {
      return '<div class="flex flex-wrap justify-center gap-2">' + nums.map(function(n, i) {
        var text = i === missingIndex ? "?" : n;
        var cls = i === missingIndex ? "bg-amber-100 text-amber-700 border-amber-300" : "bg-white text-slate-700 border-slate-200";
        return '<span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center font-black text-lg ' + cls + '">' + text + '</span>';
      }).join("") + '</div>';
    }

    function emojiGrid(count, emoji) {
      if (count === 0) {
        return '<div class="text-center text-4xl font-black text-slate-400 py-3">0</div>';
      }
      var items = [];
      for (var i = 0; i < count; i++) items.push('<span class="text-3xl">' + emoji + '</span>');
      return '<div class="bg-white rounded-2xl border border-slate-200 p-3 flex flex-wrap justify-center gap-2">' + items.join("") + '</div>';
    }

    function twoGroups(a, b, emojiA, emojiB) {
      return '<div class="grid grid-cols-2 gap-3">' +
        '<div><div class="text-xs text-center font-bold text-slate-400 mb-1">กลุ่มที่ 1</div>' + emojiGrid(a, emojiA) + '</div>' +
        '<div><div class="text-xs text-center font-bold text-slate-400 mb-1">กลุ่มที่ 2</div>' + emojiGrid(b, emojiB) + '</div>' +
      '</div>';
    }

    function partWhole(total, a, b) {
      return '<div class="flex items-center justify-center gap-2">' +
        '<div class="w-16 h-16 rounded-full bg-sky-500 text-white flex items-center justify-center font-black text-2xl">' + total + '</div>' +
        '<div class="text-3xl font-black text-slate-300">=</div>' +
        '<div class="flex flex-col gap-2">' +
          '<div class="w-14 h-12 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-black text-xl">' + a + '</div>' +
          '<div class="w-14 h-12 rounded-full bg-amber-100 text-amber-700 flex items-center justify-center font-black text-xl">' + b + '</div>' +
        '</div>' +
      '</div>';
    }

    function partWholeQuestion(total, a, b, hide) {
      var whole = hide === "total" ? "?" : total;
      var left = hide === "a" ? "?" : a;
      var right = hide === "b" ? "?" : b;
      return '<div class="flex items-center justify-center gap-2">' +
        '<div class="w-16 h-16 rounded-full bg-sky-500 text-white flex items-center justify-center font-black text-2xl">' + whole + '</div>' +
        '<div class="text-3xl font-black text-slate-300">=</div>' +
        '<div class="flex flex-col gap-2">' +
          '<div class="w-14 h-12 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-black text-xl">' + left + '</div>' +
          '<div class="w-14 h-12 rounded-full bg-amber-100 text-amber-700 flex items-center justify-center font-black text-xl">' + right + '</div>' +
        '</div>' +
      '</div>';
    }

    function expressionValue(expr) {
      if (expr.op === "+") return expr.a + expr.b;
      return expr.a - expr.b;
    }

    function expressionText(expr) {
      return expr.a + " " + expr.op + " " + expr.b;
    }

    function makeQuestion(unit, title, prompt, answer, options, visual, explanation) {
      return {
        unit: unit,
        title: title,
        prompt: prompt,
        answer: String(answer),
        options: options || uniqOptions(answer, 0, unit === 4 ? 20 : 10, 4),
        visual: visual || "",
        explanation: explanation || "คำตอบคือ " + answer
      };
    }

    function genUnit1() {
      var type = rand(1, 7);
      if (type === 1) {
        var n = rand(5, 10), em = pick(icons);
        return makeQuestion(1, "นับรูป", "มีทั้งหมดกี่ชิ้น?", n, uniqOptions(n, 0, 10, 4), emojiGrid(n, em), "นับได้ " + n + " ชิ้น");
      }
      if (type === 2) {
        var n2 = rand(5, 9);
        return makeQuestion(1, "เลขไทยกับเลขอารบิก", "เลขไทย " + thaiDigits[n2] + " ตรงกับข้อใด?", n2, uniqOptions(n2, 0, 10, 4), "", thaiDigits[n2] + " คือ " + n2);
      }
      if (type === 3) {
        var a = rand(0, 10), b = rand(0, 10);
        return makeQuestion(1, "เปรียบเทียบจำนวน", a + " ___ " + b + " ควรใส่เครื่องหมายใด?", compareSymbol(a,b), shuffle([">","<","="]), "", a + " " + compareSymbol(a,b) + " " + b);
      }
      if (type === 4) {
        var total = rand(6, 10), p = rand(2, total - 2), q = total - p;
        return makeQuestion(1, "ส่วนย่อย-ส่วนรวม", p + " + " + q + " = ?", total, uniqOptions(total, 0, 10, 4), partWholeQuestion(total, p, q, "total"), p + " รวมกับ " + q + " ได้ " + total);
      }
      if (type === 5) {
        var start = rand(3, 6);
        var nums = [start, start + 1, start + 2, start + 3];
        var missingIndex = rand(0, 3);
        var ans = nums[missingIndex];
        var shown = nums.map(function(n, i) { return i === missingIndex ? "?" : n; });
        return makeQuestion(1, "เรียงลำดับจำนวน", "เติมจำนวนที่หายไป: " + shown.join(" , "), ans, uniqOptions(ans, 0, 10, 4), sequenceVisual(nums, missingIndex), "ลำดับคือ " + nums.join(" , "));
      }
      if (type === 6) {
        var base = rand(1, 9);
        var askNext = Math.random() > 0.5;
        var ansNum = askNext ? base + 1 : base - 1;
        var visualNums = askNext ? [base, "?"] : ["?", base];
        return makeQuestion(
          1,
          askNext ? "จำนวนถัดไป" : "จำนวนก่อนหน้า",
          (askNext ? "จำนวนถัดจาก " : "จำนวนก่อนหน้า ") + base + " คือข้อใด?",
          ansNum,
          uniqOptions(ansNum, 0, 10, 4),
          sequenceVisual(visualNums, askNext ? 1 : 0),
          "คำตอบคือ " + ansNum
        );
      }
      var pos = rand(1, 5);
      var names = ["ที่ 1","ที่ 2","ที่ 3","ที่ 4","ที่ 5"];
      return makeQuestion(1, "อันดับที่", "ดาวสีฟ้าอยู่ลำดับที่เท่าไร?", "ที่ " + pos, shuffle(names), ordinalVisual(pos), "ดาวสีฟ้าอยู่" + "ที่ " + pos);
    }

    function ordinalVisual(pos) {
      var html = '<div class="flex justify-center gap-2">';
      for (var i = 1; i <= 5; i++) {
        var cls = i === pos ? "bg-sky-500 text-white" : "bg-white text-amber-400";
        html += '<span class="w-12 h-12 rounded-xl border-2 border-slate-200 flex items-center justify-center text-2xl ' + cls + '">★</span>';
      }
      return html + '</div>';
    }

    function hardAddPair() {
      var sum = rand(6, 10);
      var a = rand(2, sum - 2);
      var b = sum - a;
      return {a: a, b: b, result: sum};
    }

    function hardSubPair() {
      var total = rand(6, 10);
      var take = rand(2, total - 2);
      var left = total - take;
      return {total: total, take: take, left: left};
    }

    function hardAddExpr() {
      var pair = hardAddPair();
      return {a: pair.a, b: pair.b, op: "+"};
    }

    function hardTeenPart() {
      var n = rand(12, 19);
      return {n: n, ones: n - 10};
    }

    function genUnit2() {
      var type = rand(1, 7);
      var pair = hardAddPair();
      var a = pair.a, b = pair.b, sum = pair.result;
      if (type === 1) {
        return makeQuestion(2, "บวกจำนวน", a + " + " + b + " = ?", sum, uniqOptions(sum, 0, 10, 4), "", a + " + " + b + " = " + sum);
      }
      if (type === 2) {
        return makeQuestion(2, "บวกจากรูปภาพ", "กลุ่มที่ 1 รวมกับกลุ่มที่ 2 มีทั้งหมดกี่ชิ้น?", sum, uniqOptions(sum, 0, 10, 4), twoGroups(a, b, pick(icons), pick(icons)), a + " + " + b + " = " + sum);
      }
      if (type === 3) {
        var hidden = hardAddPair();
        var total = hidden.result, known = hidden.a, miss = hidden.b;
        return makeQuestion(2, "เติมตัวไม่ทราบค่า", known + " + ? = " + total, miss, uniqOptions(miss, 0, 10, 4), partWholeQuestion(total, known, miss, "b"), known + " ต้องบวก " + miss + " จึงได้ " + total);
      }
      if (type === 4) {
        return makeQuestion(2, "สลับที่การบวก", b + " + " + a + " = ?", sum, uniqOptions(sum, 0, 10, 4), "", "การบวกสลับที่ได้ " + sum + " เหมือนกัน");
      }
      if (type === 5) {
        var targetPair = hardAddPair();
        var target = targetPair.result;
        var x = targetPair.a;
        var y = targetPair.b;
        return makeQuestion(2, "เลือกประโยคสัญลักษณ์", "ข้อใดมีผลบวกเท่ากับ " + target + "?", x + " + " + y, makeEquationOptions(x, y, "+", 10, target), "", x + " + " + y + " = " + target);
      }
      if (type === 6) {
        var left = hardAddExpr();
        var right = hardAddExpr();
        return makeQuestion(2, "เปรียบเทียบผลบวก", expressionText(left) + " ___ " + expressionText(right) + " ควรใส่เครื่องหมายใด?", compareSymbol(expressionValue(left), expressionValue(right)), shuffle([">","<","="]), "", expressionValue(left) + " " + compareSymbol(expressionValue(left), expressionValue(right)) + " " + expressionValue(right));
      }
      var storyAdd = pickStoryItem();
      return makeQuestion(2, "โจทย์ปัญหาการบวก", "มี" + storyAdd.name + " " + a + " ชิ้น ได้เพิ่ม " + b + " ชิ้น รวมมีกี่ชิ้น?", sum, uniqOptions(sum, 0, 10, 4), emojiGrid(a, storyAdd.emoji) + '<div class="text-center text-2xl font-black my-1">+</div>' + emojiGrid(b, storyAdd.emoji), a + " + " + b + " = " + sum);
    }

    function genUnit3() {
      var type = rand(1, 7);
      var sub = hardSubPair();
      var total = sub.total, take = sub.take, left = sub.left;
      if (type === 1) {
        return makeQuestion(3, "ลบจำนวน", total + " - " + take + " = ?", left, uniqOptions(left, 0, 10, 4), "", total + " - " + take + " = " + left);
      }
      if (type === 2) {
        return makeQuestion(3, "ลบจากรูปภาพ", "มี " + total + " ชิ้น เอาออก " + take + " ชิ้น เหลือกี่ชิ้น?", left, uniqOptions(left, 0, 10, 4), emojiGrid(total, pick(icons)), total + " - " + take + " = " + left);
      }
      if (type === 3) {
        return makeQuestion(3, "เติมตัวไม่ทราบค่า", total + " - ? = " + left, take, uniqOptions(take, 0, 10, 4), partWholeQuestion(total, take, left, "a"), total + " ลบ " + take + " เหลือ " + left);
      }
      if (type === 4) {
        var rel = hardAddPair();
        var a = rel.a, b = rel.b, sum = rel.result;
        return makeQuestion(3, "ความสัมพันธ์บวกและลบ", sum + " - " + a + " = ?", b, uniqOptions(b, 0, 10, 4), partWholeQuestion(sum, a, b, "b"), "เพราะ " + a + " + " + b + " = " + sum);
      }
      if (type === 5) {
        var eqSub = hardSubPair();
        var target = eqSub.left;
        var remove = eqSub.take;
        var start = eqSub.total;
        return makeQuestion(3, "เลือกประโยคสัญลักษณ์", "ข้อใดมีคำตอบเท่ากับ " + target + "?", start + " - " + remove, makeEquationOptions(start, remove, "-", 10, target), "", start + " - " + remove + " = " + target);
      }
      if (type === 6) {
        var leftExpr = makeSubExpr();
        var rightExpr = makeSubExpr();
        return makeQuestion(3, "เปรียบเทียบผลลบ", expressionText(leftExpr) + " ___ " + expressionText(rightExpr) + " ควรใส่เครื่องหมายใด?", compareSymbol(expressionValue(leftExpr), expressionValue(rightExpr)), shuffle([">","<","="]), "", expressionValue(leftExpr) + " " + compareSymbol(expressionValue(leftExpr), expressionValue(rightExpr)) + " " + expressionValue(rightExpr));
      }
      var storySub = pickStoryItem();
      return makeQuestion(3, "โจทย์ปัญหาการลบ", "มี" + storySub.name + " " + total + " ชิ้น ให้เพื่อนไป " + take + " ชิ้น เหลือกี่ชิ้น?", left, uniqOptions(left, 0, 10, 4), emojiGrid(total, storySub.emoji), total + " - " + take + " = " + left);
    }

    function genUnit4() {
      var type = rand(1, 5);
      if (type === 1) {
        var n = rand(11, 20);
        return makeQuestion(4, "อ่านจำนวน 11-20", "จำนวนนี้คือข้อใด?", n, uniqOptions(n, 11, 20, 4), tenFrame(n), "มี 10 กับอีก " + (n - 10) + " รวมเป็น " + n);
      }
      if (type === 2) {
        var teen = hardTeenPart();
        var n2 = teen.n, ones = teen.ones;
        return makeQuestion(4, "สิบกับหน่วย", "10 + " + ones + " = ?", n2, uniqOptions(n2, 11, 20, 4), tenFrame(n2), "10 + " + ones + " = " + n2);
      }
      if (type === 3) {
        var a = rand(11, 20), b = rand(11, 20);
        return makeQuestion(4, "เปรียบเทียบ 11-20", a + " ___ " + b + " ควรใส่เครื่องหมายใด?", compareSymbol(a,b), shuffle([">","<","="]), "", a + " " + compareSymbol(a,b) + " " + b);
      }
      if (type === 4) {
        var start = rand(11, 16);
        var nums = [start, start + 1, start + 2, start + 3];
        var idx = rand(0, 3);
        var ans = nums[idx];
        var shown = nums.map(function(n, i) { return i === idx ? "?" : n; });
        return makeQuestion(4, "เรียงลำดับ 11-20", "เติมจำนวนที่หายไป: " + shown.join(" , "), ans, uniqOptions(ans, 11, 20, 4), sequenceVisual(nums, idx), "ลำดับคือ " + nums.join(" , "));
      }
      var n3 = rand(12, 19);
      if (Math.random() > 0.5) {
        return makeQuestion(4, "จำนวนก่อนหน้า", "จำนวนที่น้อยกว่า " + n3 + " อยู่ 1 คือข้อใด?", n3 - 1, uniqOptions(n3 - 1, 11, 20, 4), sequenceVisual(["?", n3], 0), (n3 - 1) + " น้อยกว่า " + n3 + " อยู่ 1");
      }
      return makeQuestion(4, "จำนวนถัดไป", "จำนวนที่มากกว่า " + n3 + " อยู่ 1 คือข้อใด?", n3 + 1, uniqOptions(n3 + 1, 11, 20, 4), sequenceVisual([n3, "?"], 1), (n3 + 1) + " มากกว่า " + n3 + " อยู่ 1");
    }

    function pickStoryItem() {
      return pick([
        {name:"แอปเปิล", emoji:"🍎"},
        {name:"กล้วย", emoji:"🍌"},
        {name:"แครอท", emoji:"🥕"},
        {name:"คุกกี้", emoji:"🍪"},
        {name:"คัพเค้ก", emoji:"🧁"},
        {name:"ดินสอ", emoji:"✏️"},
        {name:"หนังสือ", emoji:"📚"},
        {name:"ลูกบอล", emoji:"⚽"},
        {name:"น้ำผลไม้", emoji:"🧃"}
      ]);
    }

    function makeEquationOptions(a, b, op, max, targetValue) {
      var answer = a + " " + op + " " + b;
      var options = [answer];
      var guard = 0;
      while (options.length < 4 && guard < 80) {
        var x, y;
        if (op === "+") {
          var p = hardAddPair();
          x = p.a;
          y = p.b;
        } else {
          var s = hardSubPair();
          x = s.total;
          y = s.take;
        }
        var text = x + " " + op + " " + y;
        var value = op === "+" ? x + y : x - y;
        if (value !== targetValue && options.indexOf(text) === -1) options.push(text);
        guard++;
      }
      return shuffle(options);
    }

    function makeSubExpr() {
      var pair = hardSubPair();
      return {a: pair.total, b: pair.take, op:"-"};
    }

    function tenFrame(n) {
      var ones = n - 10;
      var full = '<div class="bg-sky-100 border-2 border-sky-200 rounded-2xl p-3 mb-2"><div class="text-xs font-black text-sky-600 text-center mb-1">10</div>' + emojiGrid(10, "🔵") + '</div>';
      var extra = '<div class="bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-3"><div class="text-xs font-black text-emerald-600 text-center mb-1">อีก ' + ones + '</div>' + emojiGrid(ones, "🟢") + '</div>';
      return full + extra;
    }

    function buildQuiz(mode) {
      var result = [];
      var units = mode === "all" ? [1,2,3,4] : [mode];
      units.forEach(function(unit) {
        for (var i = 0; i < 15; i++) {
          if (unit === 1) result.push(genUnit1());
          if (unit === 2) result.push(genUnit2());
          if (unit === 3) result.push(genUnit3());
          if (unit === 4) result.push(genUnit4());
        }
      });
      return shuffle(result);
    }

    function startQuiz(mode) {
      selectedMode = mode;
      quiz = buildQuiz(mode);
      current = 0;
      score = 0;
      unitScores = {};
      [1,2,3,4].forEach(function(u) { unitScores[u] = {right:0, total:0}; });
      document.getElementById("home-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.remove("hidden");
      document.getElementById("total-display").innerText = quiz.length;
      document.getElementById("question-total").innerText = quiz.length;
      loadQuestion();
    }

    function restartSameMode() {
      startQuiz(selectedMode);
    }

    function goHome() {
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.add("hidden");
      document.getElementById("home-screen").classList.remove("hidden");
    }

    function playQuestionAudio() {
      if (!quiz[current]) return;
      var q = quiz[current];
      safeSpeak(speakMathText(q.title + ". " + q.prompt), "th-TH", 0.85);
    }

    function loadQuestion() {
      var q = quiz[current];
      document.getElementById("score-display").innerText = score;
      document.getElementById("question-number").innerText = current + 1;
      document.getElementById("progress-bar").style.width = (current / quiz.length * 100) + "%";
      document.getElementById("unit-badge").innerText = "หน่วย " + q.unit + ": " + unitNames[q.unit];
      document.getElementById("question-title").innerText = q.title;
      document.getElementById("question-prompt").innerText = q.prompt;
      document.getElementById("question-visual").innerHTML = q.visual;
      document.getElementById("feedback").classList.add("hidden");
      document.getElementById("next-btn").classList.add("hidden");

      var options = document.getElementById("options");
      options.innerHTML = "";
      q.options.forEach(function(opt) {
        var btn = document.createElement("button");
        btn.className = "bg-white border-2 border-sky-200 hover:bg-sky-50 text-slate-800 font-black text-2xl min-h-[64px] rounded-2xl shadow-sm active:scale-95 transition";
        btn.innerText = opt;
        btn.onclick = function() { chooseAnswer(opt, btn); };
        options.appendChild(btn);
      });
    }

    function chooseAnswer(opt, btn) {
      var q = quiz[current];
      var buttons = document.querySelectorAll("#options button");
      buttons.forEach(function(b) { b.classList.add("pointer-events-none"); });
      unitScores[q.unit].total++;

      var feedback = document.getElementById("feedback");
      feedback.classList.remove("hidden");
      if (String(opt) === q.answer) {
        playSoundEffect("correct");
        safeSpeak("ถูกต้อง เก่งมาก", "th-TH", 0.95);
        score++;
        unitScores[q.unit].right++;
        btn.className = "bg-emerald-500 border-2 border-emerald-600 text-white font-black text-2xl min-h-[64px] rounded-2xl shadow-sm";
        feedback.className = "rounded-2xl p-3 mb-4 text-center font-bold bg-emerald-50 text-emerald-700 border border-emerald-200";
        feedback.innerText = "ถูกต้อง เก่งมาก! " + q.explanation;
      } else {
        playSoundEffect("wrong");
        safeSpeak(speakMathText("ยังไม่ใช่ คำตอบที่ถูกคือ " + q.answer), "th-TH", 0.95);
        btn.className = "bg-rose-500 border-2 border-rose-600 text-white font-black text-2xl min-h-[64px] rounded-2xl shadow-sm";
        buttons.forEach(function(b) {
          if (b.innerText === q.answer) {
            b.className = "bg-emerald-500 border-2 border-emerald-600 text-white font-black text-2xl min-h-[64px] rounded-2xl shadow-sm";
          }
        });
        feedback.className = "rounded-2xl p-3 mb-4 text-center font-bold bg-rose-50 text-rose-700 border border-rose-200";
        feedback.innerText = "ยังไม่ใช่จ้า คำตอบคือ " + q.answer + " เพราะ " + q.explanation;
      }
      document.getElementById("score-display").innerText = score;
      document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
      if (current >= quiz.length - 1) {
        showResult();
      } else {
        current++;
        loadQuestion();
      }
    }

    function showResult() {
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.remove("hidden");
      document.getElementById("final-score").innerText = score;
      document.getElementById("final-total").innerText = quiz.length;
      document.getElementById("result-icon").innerText = score === quiz.length ? "👑" : score >= quiz.length * 0.8 ? "🏆" : score >= quiz.length * 0.6 ? "✨" : "💪";
      var summary = document.getElementById("unit-summary");
      summary.innerHTML = "";
      [1,2,3,4].forEach(function(u) {
        if (unitScores[u].total > 0) {
          var row = document.createElement("div");
          row.className = "bg-slate-50 border border-slate-200 rounded-xl p-3 flex justify-between items-center";
          row.innerHTML = '<span class="font-bold text-slate-700">หน่วย ' + u + '</span><span class="font-black text-sky-700">' + unitScores[u].right + '/' + unitScores[u].total + '</span>';
          summary.appendChild(row);
        }
      });
    }
  </script>
</body>
</html>
