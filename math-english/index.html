<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Math in English ป.1 — คณิตภาษาอังกฤษ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { -webkit-text-size-adjust: 100%; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .pop { animation: pop .18s ease; }
    @keyframes pop { 0% { transform: scale(.9); } 60% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .shake { animation: shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  </style>
</head>
<body class="min-h-screen bg-cyan-50 p-3 font-sans select-none">
  <main class="max-w-lg mx-auto">
    <!-- ================= HOME ================= -->
    <section id="home-screen" class="min-h-screen flex flex-col justify-center">
      <div class="bg-white border-4 border-cyan-200 rounded-3xl shadow-xl p-5">
        <div class="text-center mb-5">
          <div class="text-5xl mb-2">🔤➕</div>
          <p class="text-xs font-black text-cyan-500 uppercase tracking-wider">Grade 1 · Math in English</p>
          <h1 class="text-2xl font-black text-slate-800">คณิตภาษาอังกฤษ ป.1</h1>
          <p class="text-sm font-bold text-slate-500 mt-1">มีเสียงอ่านอังกฤษ 🔊 + คำแปลไทย · สุ่มใหม่ทุกครั้ง</p>
        </div>

        <div class="grid gap-2.5 mb-4">
          <button onclick="startQuiz('all')" class="bg-cyan-600 hover:bg-cyan-700 text-white text-left rounded-2xl p-4 shadow-md active:scale-95 transition">
            <div class="text-lg font-black">🎯 ทำรวมทุกเรื่อง</div>
            <div class="text-xs font-semibold text-cyan-100">สุ่มเรื่องละ 4 ข้อ รวม 28 ข้อ พร้อมสรุปแยกเรื่อง</div>
          </button>
          <div id="unit-buttons" class="grid gap-2.5"></div>
        </div>

        <a href="../" class="block text-center text-xs font-bold text-slate-500 underline">กลับหน้าเลือกแบบฝึกหัด</a>
      </div>
    </section>

    <!-- ================= QUIZ ================= -->
    <section id="quiz-screen" class="hidden py-3">
      <div class="bg-white border-4 border-cyan-200 rounded-3xl shadow-xl p-4">
        <div class="flex items-center justify-between gap-2 mb-3">
          <button onclick="goHome()" class="text-xs bg-slate-100 text-slate-700 font-bold px-3 py-2 rounded-full active:scale-95 transition">🏠 หน้าแรก</button>
          <button onclick="restartSameMode()" class="text-xs bg-amber-100 text-amber-700 font-bold px-3 py-2 rounded-full active:scale-95 transition">สุ่มใหม่ 🔄</button>
        </div>

        <div class="flex items-center justify-between mb-3">
          <span id="unit-badge" class="bg-cyan-100 text-cyan-700 font-black px-3 py-1 rounded-full text-xs">Unit 1</span>
          <span class="text-amber-500 font-black">⭐ <span id="score-display">0</span>/<span id="total-display">28</span></span>
        </div>

        <div class="w-full bg-slate-100 rounded-full h-2 mb-3 overflow-hidden">
          <div id="progress-bar" class="bg-cyan-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="text-center text-xs font-black text-slate-400 mb-2">
          ข้อที่ <span id="question-number">1</span>/<span id="question-total">28</span>
        </div>

        <div id="question-card" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 mb-3">
          <div id="question-visual" class="text-center"></div>
          <div class="flex items-center justify-center gap-2 mb-1">
            <button id="speak-btn" class="shrink-0 w-11 h-11 rounded-full bg-cyan-500 hover:bg-cyan-600 text-white text-xl shadow active:scale-90 transition" title="อ่านอีกครั้ง">🔊</button>
            <p id="question-en" class="text-lg font-black text-center text-slate-800 leading-snug"></p>
          </div>
          <p id="question-th" class="text-sm font-semibold text-center text-slate-500 mt-1"></p>
        </div>

        <div id="answer-area" class="mb-3"></div>

        <div id="feedback" class="hidden rounded-2xl p-3 mb-3 text-center font-bold"></div>

        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3.5 rounded-2xl shadow-md active:scale-95 transition text-lg">ข้อถัดไป ➜</button>
      </div>
    </section>

    <!-- ================= RESULT ================= -->
    <section id="result-screen" class="hidden min-h-screen flex flex-col justify-center">
      <div class="bg-white border-4 border-amber-300 rounded-3xl shadow-xl p-5 text-center">
        <div id="result-icon" class="text-6xl mb-3">🏆</div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">สรุปคะแนน</h2>
        <div class="bg-cyan-50 border border-cyan-100 rounded-2xl p-4 mb-4">
          <div class="text-sm font-bold text-cyan-600">คะแนนรวม</div>
          <div class="text-5xl font-black text-cyan-900"><span id="final-score">0</span>/<span id="final-total">28</span></div>
        </div>
        <div id="unit-summary" class="space-y-2 text-left mb-5"></div>
        <button onclick="restartSameMode()" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-black py-3 rounded-2xl shadow-md active:scale-95 transition mb-3">สุ่มโจทย์ใหม่อีกชุด</button>
        <button onclick="goHome()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-black py-3 rounded-2xl active:scale-95 transition">กลับหน้าแรก</button>
      </div>
    </section>
  </main>

  <script>
    /* =====================================================================
       ข้อมูลหน่วย
    ===================================================================== */
    var unitNames = {
      1: "Numbers & Words",
      2: "Comparing Numbers",
      3: "Ordering Numbers",
      4: "Number Bonds",
      5: "Addition",
      6: "Subtraction",
      7: "Word Problems"
    };
    var unitSub = {
      1: "ตัวเลข ↔ คำอ่านอังกฤษ · นับจำนวน",
      2: "equal, more than, less than, not equal (> < = ≠)",
      3: "increasing, decreasing, before / after / between",
      4: "whole, part, altogether, make",
      5: "add, plus, count on, adding zero",
      6: "subtract, minus, take away, how many left",
      7: "โจทย์ปัญหาอังกฤษ · key word → operation"
    };
    var ALL_UNITS = [1,2,3,4,5,6,7];
    var W = ["zero","one","two","three","four","five","six","seven","eight","nine","ten"];
    function w(n){ return W[n]; }

    /* =====================================================================
       เสียงอ่านภาษาอังกฤษ (Web Speech, en-US)
    ===================================================================== */
    var enVoice=null;
    function pickVoice(){
      try{
        if(!window.speechSynthesis) return;
        var vs=window.speechSynthesis.getVoices();
        enVoice = vs.filter(function(v){ return /en[-_]US/i.test(v.lang); })[0]
               || vs.filter(function(v){ return /^en/i.test(v.lang); })[0] || null;
      }catch(e){}
    }
    if(window.speechSynthesis){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; }
    function speak(text){
      try{
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var u=new SpeechSynthesisUtterance(text);
        u.lang="en-US"; u.rate=0.82; u.pitch=1.05;
        if(enVoice) u.voice=enVoice;
        window.speechSynthesis.speak(u);
      }catch(e){}
    }

    /* =====================================================================
       เสียงเอฟเฟกต์
    ===================================================================== */
    var audioCtx=null;
    function initAudio(){
      try{
        if(!audioCtx && (window.AudioContext||window.webkitAudioContext)){
          audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        }
        if(audioCtx && audioCtx.state==="suspended") audioCtx.resume();
      }catch(e){}
    }
    function tone(freq,wave,dur,delay){
      try{
        if(!audioCtx)return;
        var o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type=wave; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
        var t=audioCtx.currentTime;
        g.gain.setValueAtTime(0.16,t+delay);
        g.gain.exponentialRampToValueAtTime(0.01,t+delay+dur);
        o.start(t+delay); o.stop(t+delay+dur);
      }catch(e){}
    }
    function sfx(type){
      initAudio();
      if(type==="correct"){ tone(523.25,"sine",0.1,0); tone(659.25,"sine",0.1,0.1); tone(783.99,"sine",0.24,0.2); }
      else if(type==="tap"){ tone(440,"sine",0.05,0); }
      else { tone(260,"triangle",0.18,0); tone(180,"triangle",0.24,0.14); }
    }

    /* =====================================================================
       สุ่ม / ช่วยเหลือ
    ===================================================================== */
    function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
    function pick(arr){ return arr[rand(0,arr.length-1)]; }
    function shuffle(arr){
      var c=arr.slice();
      for(var i=c.length-1;i>0;i--){ var j=rand(0,i); var t=c[i]; c[i]=c[j]; c[j]=t; }
      return c;
    }
    function uniqNums(answer,min,max,count){
      var o=[answer], g=0;
      while(o.length<count && g<120){ var n=rand(min,max); if(o.indexOf(n)===-1)o.push(n); g++; }
      return shuffle(o.map(String));
    }
    function wordOptions(answerWord,count){
      var o=[answerWord], g=0;
      while(o.length<count && g<120){ var word=W[rand(0,10)]; if(o.indexOf(word)===-1)o.push(word); g++; }
      return shuffle(o);
    }
    function compareSymbol(a,b){ return a>b?">":a<b?"<":"="; }
    function distinctNums(count,min,max){
      var s=[],g=0;
      while(s.length<count && g<300){ var n=rand(min,max); if(s.indexOf(n)<0) s.push(n); g++; }
      return s;
    }
    function emojiGrid(count,emoji){
      var items="";
      for(var i=0;i<count;i++) items+='<span class="text-3xl">'+emoji+'</span>';
      return '<div class="bg-white rounded-2xl border border-slate-200 p-3 flex flex-wrap justify-center gap-1.5 mb-2">'+items+'</div>';
    }
    var nouns=[
      {en:"apples",th:"แอปเปิล",e:"🍎"},{en:"stars",th:"ดาว",e:"⭐"},{en:"cars",th:"รถ",e:"🚗"},
      {en:"balls",th:"ลูกบอล",e:"⚽"},{en:"cats",th:"แมว",e:"🐱"},{en:"flowers",th:"ดอกไม้",e:"🌸"},
      {en:"fish",th:"ปลา",e:"🐟"},{en:"birds",th:"นก",e:"🐦"},{en:"cookies",th:"คุกกี้",e:"🍪"}
    ];

    function item(o){
      // o: {unit,title,en,say,th,visual,input,answer,ex}
      return {
        unit:o.unit, title:o.title, en:o.en, say:o.say||o.en, th:o.th||"",
        visual:o.visual||"", input:o.input, answer:String(o.answer), ex:o.ex||""
      };
    }

    /* =====================================================================
       ตัวสร้างโจทย์แต่ละเรื่อง
    ===================================================================== */
    // ---- Unit 1: Numbers & Words ----
    function genU1(){
      var type=rand(1,4);
      if(type===1){ var n=rand(0,10);
        return item({unit:1,title:"Number → Word",en:'How do you write the number '+n+' in words?',
          say:'How do you write the number '+w(n)+' in words?',th:'เลข '+n+' เขียนเป็นคำอ่านอังกฤษว่าอะไร',
          input:{type:"choice",options:wordOptions(w(n),4)},answer:w(n),ex:n+' = "'+w(n)+'"'}); }
      if(type===2){ var n=rand(0,10);
        return item({unit:1,title:"Word → Number",en:'Which number is "'+w(n)+'"?',
          say:'Which number is '+w(n)+'?',th:'คำว่า "'+w(n)+'" คือเลขอะไร',
          input:{type:"choice",options:uniqNums(n,0,10,4)},answer:n,ex:'"'+w(n)+'" = '+n}); }
      if(type===3){ var no=pick(nouns), n=rand(3,10);
        return item({unit:1,title:"Count",en:'How many '+no.en+' are there?',
          say:'How many '+no.en+' are there?',th:'มี'+no.th+'กี่ชิ้น',
          visual:emojiGrid(n,no.e),input:{type:"pad",max:10},answer:n,ex:'There are '+n+' '+no.en+' ('+n+' '+no.th+')'}); }
      var no=pick(nouns), n=rand(3,10);
      return item({unit:1,title:"Count → Word",en:'Count the '+no.en+'. Which word shows how many?',
        say:'Count the '+no.en+'. Which word shows how many?',th:'นับ'+no.th+' แล้วเลือกคำอ่านของจำนวนนั้น',
        visual:emojiGrid(n,no.e),input:{type:"choice",options:wordOptions(w(n),4)},answer:w(n),ex:'There are '+n+' = "'+w(n)+'"'});
    }

    // ---- Unit 2: Comparing Numbers ----
    var cmp=[{s:">",word:"greater than",th:"มากกว่า"},{s:"<",word:"less than",th:"น้อยกว่า"},
             {s:"=",word:"equal to",th:"เท่ากับ"},{s:"≠",word:"not equal to",th:"ไม่เท่ากับ"}];
    function genU2(){
      var type=rand(1,7);
      if(type===1){ var c=pick(cmp);
        return item({unit:2,title:"Symbol meaning",en:'Which symbol means "'+c.word+'"?',
          say:'Which symbol means '+c.word+'?',th:'สัญลักษณ์ใดแปลว่า "'+c.th+'"',
          input:{type:"choice",options:shuffle([">","<","=","≠"])},answer:c.s,ex:'"'+c.word+'" = '+c.s+' ('+c.th+')'}); }
      if(type===2){ var a=rand(0,10),b=rand(0,10);
        return item({unit:2,title:"Choose symbol",en:a+'  ___  '+b+'   ( > < or = )',
          say:w(a)+', '+w(b)+'. Which symbol goes in the blank?',th:a+' ___ '+b+' ควรใส่สัญลักษณ์ใด',
          input:{type:"choice",options:shuffle([">","<","="])},answer:compareSymbol(a,b),ex:a+' '+compareSymbol(a,b)+' '+b}); }
      if(type===3){ var a=rand(0,10),b=rand(0,10);
        var ans=a>b?"more than":a<b?"less than":"equal to";
        return item({unit:2,title:"Choose the words",en:'Choose the words:  '+a+' is ___ '+b,
          say:w(a)+' is what, compared to '+w(b)+'?',th:a+' ___ '+b+' (มากกว่า / น้อยกว่า / เท่ากับ)',
          input:{type:"choice",options:shuffle(["more than","less than","equal to"])},answer:ans,ex:a+' is '+ans+' '+b}); }
      if(type===4){ var ns=distinctNums(2,0,10), askMore=Math.random()>0.5;
        var ans=askMore?Math.max(ns[0],ns[1]):Math.min(ns[0],ns[1]);
        return item({unit:2,title:askMore?"Which is more":"Which is fewer",
          en:'Which number is '+(askMore?"more":"fewer")+', '+ns[0]+' or '+ns[1]+'?',
          say:'Which number is '+(askMore?"more":"fewer")+', '+w(ns[0])+' or '+w(ns[1])+'?',
          th:'จำนวนใด'+(askMore?"มากกว่า":"น้อยกว่า")+' ระหว่าง '+ns[0]+' กับ '+ns[1],
          input:{type:"choice",options:shuffle([String(ns[0]),String(ns[1])])},answer:ans,ex:ans+' is '+(askMore?"more":"fewer")}); }
      if(type===5){ var n=rand(1,9), more=Math.random()>0.5;
        return item({unit:2,title:more?"1 more than":"1 less than",
          en:'1 '+(more?"more":"less")+' than '+n+' is ___',
          say:'One '+(more?"more":"less")+' than '+w(n)+' is?',
          th:(more?"มากกว่า":"น้อยกว่า")+' '+n+' อยู่ 1 คือเท่าไร',
          input:{type:"pad",max:10},answer:more?n+1:n-1,ex:'1 '+(more?"more":"less")+' than '+n+' = '+(more?n+1:n-1)}); }
      if(type===6){ var a=rand(0,10),b=rand(0,10), eq=a===b;
        return item({unit:2,title:"Equal or not equal",en:'Are '+a+' and '+b+' equal or not equal?',
          say:'Are '+w(a)+' and '+w(b)+' equal or not equal?',th:a+' กับ '+b+' เท่ากันหรือไม่เท่ากัน',
          input:{type:"choice",options:shuffle(["equal","not equal"])},answer:eq?"equal":"not equal",ex:a+(eq?" = ":" ≠ ")+b}); }
      var c=pick(cmp);
      return item({unit:2,title:"Read the symbol",en:'What does the symbol  '+c.s+'  mean?',
        say:'What does this symbol mean?',th:'สัญลักษณ์ '+c.s+' แปลว่าอะไร',
        input:{type:"choice",options:shuffle(["greater than","less than","equal to","not equal to"])},answer:c.word,ex:c.s+' = '+c.word+' ('+c.th+')'});
    }

    // ---- Unit 3: Ordering Numbers ----
    function genU3(){
      var type=rand(1,7);
      if(type===1){ var n=rand(0,9);
        return item({unit:3,title:"Comes after",en:'What number comes after '+n+'?',
          say:'What number comes after '+w(n)+'?',th:'จำนวนที่อยู่ถัดจาก '+n+' คือเท่าไร',
          input:{type:"pad",max:10},answer:n+1,ex:'After '+n+' is '+(n+1)}); }
      if(type===2){ var n=rand(1,10);
        return item({unit:3,title:"Comes before",en:'What number comes before '+n+'?',
          say:'What number comes before '+w(n)+'?',th:'จำนวนที่อยู่ก่อน '+n+' คือเท่าไร',
          input:{type:"pad",max:10},answer:n-1,ex:'Before '+n+' is '+(n-1)}); }
      if(type===3){ var a=rand(1,9);
        return item({unit:3,title:"Comes between",en:'What number is between '+(a-1)+' and '+(a+1)+'?',
          say:'What number is between '+w(a-1)+' and '+w(a+1)+'?',th:'จำนวนที่อยู่ระหว่าง '+(a-1)+' กับ '+(a+1),
          input:{type:"pad",max:10},answer:a,ex:a+' is between '+(a-1)+' and '+(a+1)}); }
      if(type===4){ var nums=distinctNums(4,0,10);
        return item({unit:3,title:"Increasing order",en:'Arrange in increasing order (small → big)',
          say:'Arrange the numbers from smallest to biggest.',th:'เรียงจากน้อยไปมาก (increasing)',
          input:{type:"order",items:nums,asc:true},answer:"",ex:'Increasing = small to big'}); }
      if(type===5){ var nums=distinctNums(4,0,10);
        return item({unit:3,title:"Decreasing order",en:'Arrange in decreasing order (big → small)',
          say:'Arrange the numbers from biggest to smallest.',th:'เรียงจากมากไปน้อย (decreasing)',
          input:{type:"order",items:nums,asc:false},answer:"",ex:'Decreasing = big to small'}); }
      if(type===6){
        return item({unit:3,title:"Vocabulary",en:'Counting from small to big is called ___',
          say:'Counting from small to big is called what?',th:'การนับจากน้อยไปมากเรียกว่าอะไร',
          input:{type:"choice",options:shuffle(["increasing","decreasing"])},answer:"increasing",ex:'small → big = increasing (เพิ่มขึ้น)'}); }
      return item({unit:3,title:"Vocabulary",en:'Counting from big to small is called ___',
        say:'Counting from big to small is called what?',th:'การนับจากมากไปน้อยเรียกว่าอะไร',
        input:{type:"choice",options:shuffle(["decreasing","increasing"])},answer:"decreasing",ex:'big → small = decreasing (ลดลง)'});
    }

    // ---- Unit 4: Number Bonds ----
    function genU4(){
      var type=rand(1,5);
      if(type===1){ var a=rand(1,8),b=rand(1,10-a);
        return item({unit:4,title:"Make",en:a+' and '+b+' make ___',
          say:w(a)+' and '+w(b)+' make?',th:a+' กับ '+b+' รวมกันได้ (make) เท่าไร',
          input:{type:"pad",max:10},answer:a+b,ex:a+' and '+b+' make '+(a+b)}); }
      if(type===2){ var whole=rand(4,10),p=rand(1,whole-1);
        return item({unit:4,title:"Missing part",en:'The whole is '+whole+'. One part is '+p+'. The other part is ___',
          say:'The whole is '+w(whole)+'. One part is '+w(p)+'. What is the other part?',
          th:'ส่วนรวม (whole) = '+whole+' ส่วนย่อยหนึ่ง = '+p+' อีกส่วนคือเท่าไร',
          input:{type:"pad",max:10},answer:whole-p,ex:p+' and '+(whole-p)+' make '+whole}); }
      if(type===3){ var a=rand(1,8),sum=rand(a+1,10);
        return item({unit:4,title:"Missing part",en:a+' and ___ make '+sum,
          say:w(a)+' and what make '+w(sum)+'?',th:a+' กับ ___ รวมกันได้ '+sum,
          input:{type:"pad",max:10},answer:sum-a,ex:a+' and '+(sum-a)+' make '+sum}); }
      if(type===4){
        return item({unit:4,title:"Vocabulary",en:'In a number bond, the total amount is called the ___',
          say:'In a number bond, the total amount is called the what?',th:'ในแผนภาพจำนวน ยอดรวมเรียกว่าอะไร',
          input:{type:"choice",options:shuffle(["whole","part"])},answer:"whole",ex:'total = whole (ส่วนรวม); each group = part (ส่วนย่อย)'}); }
      return item({unit:4,title:"Vocabulary",en:'The word "altogether" means ___',
        say:'What does the word altogether mean?',th:'คำว่า "altogether" แปลว่าอะไร',
        input:{type:"choice",options:shuffle(["the total amount","only one part","less than"])},answer:"the total amount",ex:'altogether = รวมทั้งหมด'});
    }

    // ---- Unit 5: Addition ----
    function addPair(){ var a=rand(1,8), b=rand(1,10-a); return {a:a,b:b,sum:a+b}; }
    function genU5(){
      var type=rand(1,6);
      if(type===1){ var p=addPair();
        return item({unit:5,title:"Add",en:'What is  '+p.a+' + '+p.b+' ?',
          say:'What is '+w(p.a)+' plus '+w(p.b)+'?',th:p.a+' + '+p.b+' เท่ากับเท่าไร',
          input:{type:"pad",max:10},answer:p.sum,ex:p.a+' + '+p.b+' = '+p.sum}); }
      if(type===2){
        return item({unit:5,title:"Vocabulary",en:'The word "plus" means ___',
          say:'What does the word plus mean?',th:'คำว่า "plus" แปลว่าอะไร',
          input:{type:"choice",options:shuffle(["add","subtract","equal"])},answer:"add",ex:'plus (+) = add (บวก)'}); }
      if(type===3){ var p=addPair();
        return item({unit:5,title:"Count on",en:'Count on:  '+p.a+' + '+p.b+' = ___',
          say:'Count on. '+w(p.a)+' plus '+w(p.b)+' equals?',th:'นับต่อ (count on): '+p.a+' + '+p.b,
          input:{type:"pad",max:10},answer:p.sum,ex:'Count on from '+p.a+': = '+p.sum}); }
      if(type===4){ var n=rand(1,10);
        return item({unit:5,title:"Adding zero",en:n+' + 0 = ___',
          say:w(n)+' plus zero equals?',th:'บวกศูนย์: '+n+' + 0',
          input:{type:"pad",max:10},answer:n,ex:'Adding zero keeps the number the same: '+n}); }
      if(type===5){ var p=addPair();
        return item({unit:5,title:"Missing number",en:p.a+' + ___ = '+p.sum,
          say:w(p.a)+' plus what equals '+w(p.sum)+'?',th:p.a+' + ___ = '+p.sum,
          input:{type:"pad",max:10},answer:p.b,ex:p.a+' + '+p.b+' = '+p.sum}); }
      return item({unit:5,title:"Vocabulary",en:'The answer to an addition is called the ___',
        say:'The answer to an addition is called the what?',th:'ผลลัพธ์ของการบวกเรียกว่าอะไร',
        input:{type:"choice",options:shuffle(["sum","part","less"])},answer:"sum",ex:'answer of addition = sum (ผลบวก)'});
    }

    // ---- Unit 6: Subtraction ----
    function subPair(){ var t=rand(2,10), k=rand(1,t-1); return {t:t,k:k,l:t-k}; }
    function genU6(){
      var type=rand(1,6);
      if(type===1){ var s=subPair();
        return item({unit:6,title:"Subtract",en:'What is  '+s.t+' - '+s.k+' ?',
          say:'What is '+w(s.t)+' minus '+w(s.k)+'?',th:s.t+' - '+s.k+' เท่ากับเท่าไร',
          input:{type:"pad",max:10},answer:s.l,ex:s.t+' - '+s.k+' = '+s.l}); }
      if(type===2){
        return item({unit:6,title:"Vocabulary",en:'The word "minus" means ___',
          say:'What does the word minus mean?',th:'คำว่า "minus" แปลว่าอะไร',
          input:{type:"choice",options:shuffle(["subtract","add","equal"])},answer:"subtract",ex:'minus (-) = subtract (ลบ)'}); }
      if(type===3){ var s=subPair();
        return item({unit:6,title:"Take away",en:s.t+' take away '+s.k+' is ___',
          say:w(s.t)+' take away '+w(s.k)+' is?',th:'"take away" = เอาออก/ลบ: '+s.t+' - '+s.k,
          input:{type:"pad",max:10},answer:s.l,ex:s.t+' take away '+s.k+' = '+s.l}); }
      if(type===4){ var n=rand(1,10);
        return item({unit:6,title:"Subtracting zero",en:n+' - 0 = ___',
          say:w(n)+' minus zero equals?',th:'ลบศูนย์: '+n+' - 0',
          input:{type:"pad",max:10},answer:n,ex:'Subtracting zero keeps the number the same: '+n}); }
      if(type===5){ var s=subPair();
        return item({unit:6,title:"Missing number",en:s.t+' - ___ = '+s.l,
          say:w(s.t)+' minus what equals '+w(s.l)+'?',th:s.t+' - ___ = '+s.l,
          input:{type:"pad",max:10},answer:s.k,ex:s.t+' - '+s.k+' = '+s.l}); }
      var s=subPair(), no=pick(nouns);
      return item({unit:6,title:"How many left",en:'There are '+s.t+' '+no.en+'. '+s.k+' are eaten. How many are left?',
        say:'There are '+w(s.t)+' '+no.en+'. '+w(s.k)+' are eaten. How many are left?',
        th:'มี'+no.th+' '+s.t+' ชิ้น ถูกกินไป '+s.k+' ชิ้น เหลือกี่ชิ้น (left = เหลือ)',
        visual:emojiGrid(s.t,no.e),input:{type:"pad",max:10},answer:s.l,ex:s.t+' - '+s.k+' = '+s.l+' left'});
    }

    // ---- Unit 7: Word Problems ----
    function genU7(){
      var type=rand(1,6);
      if(type===1){ var a=rand(2,6),b=rand(1,10-a);
        return item({unit:7,title:"Altogether (add)",en:'I have '+a+' rabbits. I buy '+b+' more rabbits. How many rabbits altogether?',
          say:'I have '+w(a)+' rabbits. I buy '+w(b)+' more rabbits. How many rabbits altogether?',
          th:'มีกระต่าย '+a+' ตัว ซื้อเพิ่มอีก '+b+' ตัว รวมทั้งหมดกี่ตัว',
          visual:'<div class="text-4xl mb-1">🐰</div>',input:{type:"pad",max:10},answer:a+b,ex:'altogether = add: '+a+' + '+b+' = '+(a+b)}); }
      if(type===2){ var a=rand(3,10),b=rand(1,a-1);
        return item({unit:7,title:"Fly away (subtract)",en:'There are '+a+' birds. '+b+' birds fly away. How many birds are left?',
          say:'There are '+w(a)+' birds. '+w(b)+' birds fly away. How many birds are left?',
          th:'มีนก '+a+' ตัว บินหนีไป '+b+' ตัว เหลือกี่ตัว',
          visual:'<div class="text-4xl mb-1">🐦</div>',input:{type:"pad",max:10},answer:a-b,ex:'left = subtract: '+a+' - '+b+' = '+(a-b)}); }
      if(type===3){
        return item({unit:7,title:"Key word",en:'Which key word tells you to ADD?',
          say:'Which key word tells you to add?',th:'คำใดบอกให้ "บวก"',
          input:{type:"choice",options:shuffle(["altogether","take away","fly away","are left"])},answer:"altogether",ex:'"altogether" (รวมทั้งหมด) → add'}); }
      if(type===4){
        return item({unit:7,title:"Choose operation",en:'The word "altogether" tells you to use ___',
          say:'The word altogether tells you to use what?',th:'คำว่า "altogether" ให้ใช้วิธีใด',
          input:{type:"choice",options:shuffle(["addition","subtraction"])},answer:"addition",ex:'altogether → addition (การบวก)'}); }
      if(type===5){ var a=rand(2,6),b=rand(1,10-a);
        return item({unit:7,title:"Altogether (add)",en:'There are '+a+' red apples and '+b+' green apples. How many apples altogether?',
          say:'There are '+w(a)+' red apples and '+w(b)+' green apples. How many apples altogether?',
          th:'มีแอปเปิลแดง '+a+' ผล และแอปเปิลเขียว '+b+' ผล รวมทั้งหมดกี่ผล',
          visual:'<div class="text-4xl mb-1">🍎🍏</div>',input:{type:"pad",max:10},answer:a+b,ex:a+' + '+b+' = '+(a+b)}); }
      return item({unit:7,title:"Key word",en:'Which key words tell you to SUBTRACT?',
        say:'Which key words tell you to subtract?',th:'คำใดบอกให้ "ลบ"',
        input:{type:"choice",options:shuffle(["are left","altogether","in total","and"])},answer:"are left",ex:'"are left / take away" (เหลือ/เอาออก) → subtract'});
    }

    var generators={1:genU1,2:genU2,3:genU3,4:genU4,5:genU5,6:genU6,7:genU7};

    /* =====================================================================
       สร้างชุดข้อสอบ
    ===================================================================== */
    var quiz=[], current=0, score=0, selectedMode="all", unitScores={}, answered=false;

    function buildQuiz(mode){
      var result=[];
      if(mode==="all"){
        ALL_UNITS.forEach(function(u){ for(var i=0;i<4;i++) result.push(generators[u]()); });
        return shuffle(result);
      }
      for(var i=0;i<12;i++) result.push(generators[mode]());
      return result;
    }

    function startQuiz(mode){
      initAudio(); speak(" "); // ปลุกระบบเสียงด้วย gesture แรก
      selectedMode=mode;
      quiz=buildQuiz(mode);
      current=0; score=0; unitScores={};
      ALL_UNITS.forEach(function(u){ unitScores[u]={right:0,total:0}; });
      document.getElementById("home-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.remove("hidden");
      document.getElementById("total-display").innerText=quiz.length;
      document.getElementById("question-total").innerText=quiz.length;
      window.scrollTo(0,0);
      loadQuestion();
    }
    function restartSameMode(){ startQuiz(selectedMode); }
    function goHome(){
      try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.add("hidden");
      document.getElementById("home-screen").classList.remove("hidden");
    }

    /* =====================================================================
       แสดงโจทย์ + ช่องตอบ
    ===================================================================== */
    function loadQuestion(){
      answered=false;
      var q=quiz[current];
      document.getElementById("score-display").innerText=score;
      document.getElementById("question-number").innerText=current+1;
      document.getElementById("progress-bar").style.width=(current/quiz.length*100)+"%";
      document.getElementById("unit-badge").innerText="Unit "+q.unit+": "+unitNames[q.unit];
      document.getElementById("question-visual").innerHTML=q.visual||"";
      document.getElementById("question-en").innerText=q.en;
      document.getElementById("question-th").innerText=q.th;
      document.getElementById("speak-btn").onclick=function(){ sfx("tap"); speak(q.say); };
      document.getElementById("feedback").classList.add("hidden");
      document.getElementById("next-btn").classList.add("hidden");
      renderInput(q);
      speak(q.say); // อ่านออกเสียงอัตโนมัติ
    }

    function renderInput(q){
      var area=document.getElementById("answer-area");
      area.innerHTML="";
      var t=q.input.type;
      if(t==="choice") renderChoice(q,area);
      else if(t==="pad") renderPad(q,area);
      else if(t==="order") renderOrder(q,area);
    }

    // ---------- choice ----------
    function renderChoice(q,area){
      var opts=q.input.options;
      var maxLen=0; opts.forEach(function(o){ if(String(o).length>maxLen) maxLen=String(o).length; });
      var symbolStyle = maxLen<=2;
      var grid=document.createElement("div");
      if(symbolStyle) grid.className="grid gap-3 "+(opts.length===2?"grid-cols-2 max-w-xs mx-auto":opts.length===3?"grid-cols-3":"grid-cols-2");
      else grid.className="grid gap-2.5 grid-cols-1";
      opts.forEach(function(opt){
        var btn=document.createElement("button");
        btn.setAttribute("data-v",String(opt));
        if(symbolStyle) btn.className="bg-white border-2 border-cyan-300 hover:bg-cyan-50 text-cyan-800 font-black text-4xl min-h-[68px] rounded-2xl shadow-sm active:scale-95 transition";
        else btn.className="bg-white border-2 border-cyan-200 hover:bg-cyan-50 text-slate-800 font-bold text-lg min-h-[52px] rounded-2xl shadow-sm active:scale-95 transition px-3 py-2";
        btn.innerText=opt;
        btn.onclick=function(){ if(answered)return; commitChoice(q,String(opt),btn,area); };
        grid.appendChild(btn);
      });
      area.appendChild(grid);
    }
    function commitChoice(q,val,btn,area){
      answered=true; sfx("tap");
      var correct=val===q.answer;
      area.querySelectorAll("button").forEach(function(b){
        b.classList.add("pointer-events-none");
        if(b.getAttribute("data-v")===q.answer) b.classList.add("ring-4","ring-emerald-400","bg-emerald-50");
      });
      if(!correct) btn.classList.add("ring-4","ring-rose-400","bg-rose-50","shake");
      finish(q,correct);
    }

    // ---------- number pad ----------
    function renderPad(q,area){
      var max=q.input.max||10, cols=6;
      var wrap=document.createElement("div");
      wrap.className="grid gap-2"; wrap.style.gridTemplateColumns="repeat("+cols+",minmax(0,1fr))";
      for(var i=0;i<=max;i++){
        (function(n){
          var btn=document.createElement("button");
          btn.className="bg-white border-2 border-slate-200 hover:bg-cyan-50 text-slate-800 font-black text-xl h-12 rounded-xl shadow-sm active:scale-95 transition";
          btn.innerText=n;
          btn.onclick=function(){
            if(answered)return; answered=true; sfx("tap");
            var correct=n===Number(q.answer);
            wrap.querySelectorAll("button").forEach(function(b){
              b.classList.add("pointer-events-none");
              if(parseInt(b.innerText,10)===Number(q.answer)) b.classList.add("ring-4","ring-emerald-400","bg-emerald-50");
            });
            if(!correct) btn.classList.add("ring-4","ring-rose-400","bg-rose-50","shake");
            finish(q,correct);
          };
          wrap.appendChild(btn);
        })(i);
      }
      area.appendChild(wrap);
    }

    // ---------- order (tap in order) ----------
    function renderOrder(q,area){
      var items=q.input.items.slice();
      var target=items.slice().sort(function(a,b){ return q.input.asc?a-b:b-a; });
      var picked=[];
      var info=document.createElement("div");
      info.className="text-center text-xs font-bold text-slate-400 mb-2";
      info.innerText="แตะการ์ดทีละใบ ตามลำดับที่ถูกต้อง";
      area.appendChild(info);
      var row=document.createElement("div");
      row.className="flex flex-wrap justify-center gap-3";
      items.forEach(function(n){
        var btn=document.createElement("button");
        btn.className="relative w-16 h-16 rounded-2xl border-2 border-cyan-300 bg-white text-slate-800 font-black text-2xl shadow-sm active:scale-95 transition";
        btn.innerText=n; btn.setAttribute("data-n",n);
        btn.onclick=function(){
          if(answered||this.getAttribute("data-used")==="1")return; sfx("tap");
          this.setAttribute("data-used","1"); picked.push(parseInt(this.getAttribute("data-n"),10));
          this.classList.add("bg-cyan-100","opacity-70");
          var badge=document.createElement("span");
          badge.className="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-amber-400 text-white text-xs font-black flex items-center justify-center";
          badge.innerText=picked.length; this.appendChild(badge);
          if(picked.length===items.length){
            answered=true;
            row.querySelectorAll("button").forEach(function(b){ b.classList.add("pointer-events-none"); });
            finish(q, picked.join(",")===target.join(","), "ลำดับที่ถูกคือ "+target.join(" , "));
          }
        };
        row.appendChild(btn);
      });
      area.appendChild(row);
    }

    /* =====================================================================
       สรุปผล + feedback
    ===================================================================== */
    function finish(q,correct,customWrong){
      unitScores[q.unit].total++;
      var fb=document.getElementById("feedback");
      fb.classList.remove("hidden");
      if(correct){
        sfx("correct"); score++; unitScores[q.unit].right++;
        fb.className="rounded-2xl p-3 mb-3 text-center font-bold bg-emerald-50 text-emerald-700 border border-emerald-200";
        fb.innerText="🎉 Correct! เก่งมาก · "+q.ex;
      } else {
        sfx("wrong");
        fb.className="rounded-2xl p-3 mb-3 text-center font-bold bg-rose-50 text-rose-700 border border-rose-200";
        fb.innerText="💪 Try again — "+(customWrong?customWrong+" · ":"คำตอบคือ “"+q.answer+"” · ")+q.ex;
      }
      document.getElementById("score-display").innerText=score;
      var next=document.getElementById("next-btn");
      next.classList.remove("hidden");
      next.innerText = current>=quiz.length-1 ? "ดูสรุปคะแนน 🏁" : "ข้อถัดไป ➜";
    }

    function nextQuestion(){
      if(current>=quiz.length-1) showResult();
      else { current++; window.scrollTo(0,0); loadQuestion(); }
    }

    function showResult(){
      try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.remove("hidden");
      document.getElementById("final-score").innerText=score;
      document.getElementById("final-total").innerText=quiz.length;
      var ratio=score/quiz.length;
      document.getElementById("result-icon").innerText=ratio===1?"👑":ratio>=0.8?"🏆":ratio>=0.6?"✨":"💪";
      var summary=document.getElementById("unit-summary");
      summary.innerHTML="";
      ALL_UNITS.forEach(function(u){
        if(unitScores[u].total>0){
          var row=document.createElement("div");
          row.className="bg-slate-50 border border-slate-200 rounded-xl p-3 flex justify-between items-center";
          row.innerHTML='<span class="font-bold text-slate-700 text-sm">Unit '+u+': '+unitNames[u]+'</span><span class="font-black text-cyan-700">'+unitScores[u].right+'/'+unitScores[u].total+'</span>';
          summary.appendChild(row);
        }
      });
    }

    /* =====================================================================
       สร้างปุ่มเรื่องบนหน้าแรก
    ===================================================================== */
    (function buildHome(){
      var box=document.getElementById("unit-buttons");
      ALL_UNITS.forEach(function(u){
        var btn=document.createElement("button");
        btn.className="bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-800 text-left rounded-2xl p-3.5 active:scale-95 transition";
        btn.onclick=function(){ startQuiz(u); };
        btn.innerHTML='<div class="font-black">Unit '+u+': '+unitNames[u]+'</div><div class="text-xs text-slate-500 font-semibold">'+unitSub[u]+'</div>';
        box.appendChild(btn);
      });
    })();
  </script>
</body>
